<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Холст | СИБКЛЕЙ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-white">
    <nav class="p-6 flex justify-between items-center">
        <a href="index.html" class="text-xs uppercase tracking-widest hover:text-neutral-400 transition">← Назад</a>
        <div id="user-status" class="text-xs uppercase tracking-widest text-neutral-500">
            Требуется авторизация
        </div>
    </nav>

    <main class="px-4 py-10">
        <header class="text-center mb-20">
            <h1 class="text-[15vw] font-black uppercase leading-none mb-8">Холст</h1>
            
            <!-- Кнопка входа (пока имитация) -->
            <button id="vk-login" class="bg-[#0077FF] text-white px-8 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-[#0066DD] transition-all flex items-center mx-auto gap-3">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.072 2H8.928C3.333 2 2 3.333 2 8.928v6.144C2 20.667 3.333 22 8.928 22h6.144c5.595 0 6.928-1.333 6.928-6.928V8.928C22 3.333 20.667 2 15.072 2zm3.903 13.462c-.118.28-.38.462-.68.462h-1.84c-.41 0-.76-.24-.91-.61-.34-.84-.81-1.61-1.38-2.28-.18-.21-.4-.32-.63-.32-.23 0-.44.11-.59.3-.4.5-.6 1.1-.6 1.8 0 .6-.4 1.1-1 1.1h-.8c-2.4 0-4.4-2-4.4-4.4 0-1.8.9-3.4 2.4-4.3.3-.18.6-.28.9-.28h1.8c.6 0 1 .4 1 1v.2c0 .6-.2 1.1-.6 1.5-.4.4-.6.9-.6 1.4 0 .5.2 1 .6 1.4.3.3.7.5 1.1.5.4 0 .8-.2 1.1-.5.6-.6 1-1.4 1.2-2.2.1-.4.4-.7.8-.7h1.8c.3 0 .6.2.7.5.1.3 0 .6-.2.8-.5 1.1-1.2 2.1-2.1 2.9.8.8 1.5 1.8 1.9 2.9.1.3.1.6-.1.9z"/></svg>
                Войти через ВКонтакте
            </button>
        </header>

        <!-- Область холста -->
        <div id="canvas-area" class="relative w-full aspect-video bg-neutral-900 border border-white/5 rounded-3xl overflow-hidden flex items-center justify-center">
            <p class="text-neutral-600 uppercase tracking-[0.3em] text-sm">Авторизуйтесь, чтобы добавить стикер</p>
            
            <!-- Сюда будут добавляться стикеры -->
            <div id="stickers-container" class="absolute inset-0 pointer-events-none">
                <!-- Пример стикера -->
            </div>
        </div>

        <!-- Скрытая форма загрузки -->
        <div id="upload-section" class="hidden mt-10 text-center">
            <input type="file" id="sticker-input" class="hidden" accept="image/*">
            <label for="sticker-input" class="cursor-pointer bg-white text-black px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-neutral-200 transition-all">
                Загрузить свой стикер
            </label>
            <p class="mt-4 text-xs text-neutral-500 uppercase">Максимум 1 стикер на пользователя</p>
        </div>
    </main>

    <script>
        const loginBtn = document.getElementById('vk-login');
        const uploadSection = document.getElementById('upload-section');
        const canvasText = document.querySelector('#canvas-area p');

        // Имитация логина для проверки интерфейса
        loginBtn.addEventListener('click', () => {
            loginBtn.classList.add('hidden');
            uploadSection.classList.remove('hidden');
            canvasText.innerText = 'Холст готов к работе';
            document.getElementById('user-status').innerText = 'Вы вошли как Пользователь';
        });
    </script>
</body>
</html>
