<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Холст | СИБКЛЕЙ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем VK SDK -->
    <script src="https://vk.com/js/api/openapi.js?169" type="text/javascript"></script>
</head>
<body class="bg-[#121212] text-white">
    <nav class="p-6 flex justify-between items-center">
        <a href="index.html" class="text-xs uppercase tracking-widest hover:text-neutral-400 transition">← Назад</a>
        <div id="user-status" class="text-xs uppercase tracking-widest text-neutral-500">
            Требуется авторизация
        </div>
    </nav>

    <main class="px-4 py-10">
        <header class="text-center mb-20">
            <h1 class="text-[15vw] font-black uppercase leading-none mb-8">Холст</h1>
            
            <!-- Контейнер для кнопки -->
            <div id="vk_auth" class="flex justify-center"></div>
        </header>

        <!-- Область холста -->
        <div id="canvas-area" class="relative w-full aspect-video bg-neutral-900 border border-white/5 rounded-3xl overflow-hidden flex items-center justify-center">
            <p id="canvas-placeholder" class="text-neutral-600 uppercase tracking-[0.3em] text-sm">Авторизуйтесь, чтобы добавить стикер</p>
            <div id="stickers-container" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <!-- Скрытая форма загрузки -->
        <div id="upload-section" class="hidden mt-10 text-center">
            <input type="file" id="sticker-input" class="hidden" accept="image/*">
            <label for="sticker-input" class="cursor-pointer bg-white text-black px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-neutral-200 transition-all">
                Загрузить свой стикер
            </label>
            <p class="mt-4 text-xs text-neutral-500 uppercase">Максимум 1 стикер на пользователя</p>
        </div>
    </main>

    <script type="text/javascript">
        VK.init({apiId: 54649279});

        function authInfo(response) {
            if (response.session) {
                // Пользователь авторизован
                document.getElementById('vk_auth').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
                document.getElementById('canvas-placeholder').innerText = 'Холст готов к работе';
                document.getElementById('user-status').innerText = 'Вы вошли';
            } else {
                // Пользователь не авторизован
                console.log('Не удалось авторизоваться');
            }
        }

        VK.Widgets.Auth("vk_auth", {width: "300px", onAuth: authInfo});
        
        // Проверяем статус при загрузке
        VK.Auth.getLoginStatus(authInfo);
    </script>
</body>
</html>
